server.port=8081
spring.application.name=GauharRestaurant

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Static resources
spring.web.resources.static-locations=classpath:/static/,file:src/main/webapp/

# SQL Server ? ?????? ????? ? RestaurantApplication.java ????? setDefaultProperties
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=restaurant_dbb;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.gauhar=DEBUG