<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="form-card" style="width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:28px;">
            <div style="font-size:48px;margin-bottom:12px;">🎍</div>
            <h1 style="font-size:22px;font-weight:800;color:var(--green);margin-bottom:4px;">Gauhar Restaurant</h1>
            <p style="color:var(--sub);font-size:13px;">Вход в систему</p>
        </div>

        <div class="toast error" style="margin-bottom:16px;" th:if="${param.error}">
            ❌ Неверный email или пароль
        </div>

        <div class="toast success" style="margin-bottom:16px;" th:if="${param.logout}">
            ✅ Вы вышли из системы
        </div>

        <div class="toast success" style="margin-bottom:16px;" th:if="${param.registered}">
            ✅ Аккаунт создан. Теперь войдите
        </div>

        <form method="post" th:action="@{/login}">
            <div class="form-row">
                <input type="email" name="email" placeholder="Email" required autofocus>
            </div>
            <div class="form-row">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>
            <button class="btn primary full-width" type="submit">Войти</button>
        </form>

        <div style="margin-top:20px;text-align:center;color:var(--sub);font-size:13px;">
            Нет аккаунта?
            <a th:href="@{/register}" style="color:var(--green);text-decoration:underline;">
                Зарегистрироваться
            </a>
        </div>
    </div>
</div>
</body>
</html>
